<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold text-gray-900">Dashboard Overview</h2>
        <button (click)="refreshData()"
            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition">
            🔄 Refresh Data
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <app-card *ngFor="let card of cards" [cardData]="card">
        </app-card>
    </div>

    <div class="mt-12 bg-white rounded-lg shadow-md p-8">
        <h3 class="text-xl font-bold text-gray-900 mb-4">Recent Activity</h3>
        <div class="space-y-4">
            <div class="flex items-center py-2 border-b border-gray-200">
                <div class="w-2 h-2 bg-green-500 rounded-full mr-4"></div>
                <span class="text-gray-700">New data imported successfully</span>
                <span class="text-gray-500 text-sm ml-auto">2 hours ago</span>
            </div>
            <div class="flex items-center py-2 border-b border-gray-200">
                <div class="w-2 h-2 bg-blue-500 rounded-full mr-4"></div>
                <span class="text-gray-700">System update completed</span>
                <span class="text-gray-500 text-sm ml-auto">5 hours ago</span>
            </div>
            <div class="flex items-center py-2 border-b border-gray-200">
                <div class="w-2 h-2 bg-yellow-500 rounded-full mr-4"></div>
                <span class="text-gray-700">Backup finished with 2 warnings</span>
                <span class="text-gray-500 text-sm ml-auto">1 day ago</span>
            </div>
            <div class="flex items-center py-2">
                <div class="w-2 h-2 bg-purple-500 rounded-full mr-4"></div>
                <span class="text-gray-700">Configuration updated</span>
                <span class="text-gray-500 text-sm ml-auto">3 days ago</span>
            </div>
        </div>
    </div>
</div>
