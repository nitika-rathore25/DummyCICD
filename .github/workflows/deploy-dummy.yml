name: Deploy Angular to /dummy

on:
  push:
    branches:
      - main   # change if your branch is different

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      # 🔥 Build specifically for /dummy
      - name: Build Angular app
        run: npm run build -- --configuration production --base-href /dummy/

      # 🚀 Deploy ONLY to /dummy
      - name: Upload to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/angular-dashboard/*"
          target: "/var/www/platform.insignai.com/dummy"