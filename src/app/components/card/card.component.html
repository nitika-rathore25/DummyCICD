<div [class]="'bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition border-l-4 ' + cardData.color">
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold text-gray-800">{{ cardData.title }}</h3>
        <span class="text-3xl">{{ cardData.icon }}</span>
    </div>

    <div class="mb-4">
        <p class="text-3xl font-bold text-gray-900">{{ cardData.value }}</p>
        <p class="text-sm text-gray-500 mt-1">{{ cardData.description }}</p>
    </div>

    <div class="pt-4 border-t border-gray-200">
        <a href="#" class="text-blue-600 hover:text-blue-800 font-medium text-sm">View Details →</a>
    </div>
</div>
